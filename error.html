<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - EZimarts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
            padding: 100px 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        h1 {
            font-size: 72px;
            margin-bottom: 10px;
            color: #0073e6;
        }

        h2 {
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #0073e6;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        footer {
            margin-top: 50px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>

        <p>
            Sorry, the page you are looking for does not exist or may have been moved.
        </p>

        <a href="/" class="btn">Return to Home</a>

        <footer>
            © 2026 EZimarts. All Rights Reserved.
        </footer>
    </div>
</body>
</html>
